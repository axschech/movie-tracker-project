services:
  rockbot-backend:
    build: 
      context: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_USER=rockbot
      - DB_PASSWORD=rockbotpassword
      - DB_DATABASE=rockbotdb
      - DB_HOST=rockbot-db
  rockbot-db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=rockbot
      - POSTGRES_PASSWORD=rockbotpassword
      - POSTGRES_DB=rockbotdb
    ports:
      - "5432:5432"
    volumes:
      - ./migration:/etc/migration

volumes:
  migration: